name: lifemovie_frontend
description: "LifeMovie AI - Personal Memory Studio Flutter Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Database & Key Storage
  isar: ^3.1.0+1
  isar_generator: ^3.1.0+1
  flutter_secure_storage: ^9.0.0

  # Networking & Real-time
  http: ^1.2.0
  web_socket_channel: ^2.4.1

  # UI & Design System
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lifemovie_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lifemovie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: lifemovie_redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lifemovie_backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lifemovie
      - REDIS_URL=redis://redis:6379/0
      - AUTH0_DOMAIN=dev-lifemovie.us.auth0.com
      - AUTH0_AUDIENCE=http://127.0.0.1:8000/api
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - shared_movies:/app/movies
    depends_on:
      - db
      - redis
    restart: always

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: lifemovie_worker
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/lifemovie
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
    volumes:
      - backend_uploads:/app/uploads
      - shared_movies:/app/movies
    depends_on:
      - db
      - redis
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend_web
      dockerfile: Dockerfile
    container_name: lifemovie_frontend
    ports:
      - "8080:80"
    volumes:
      - shared_movies:/usr/share/nginx/html/movies
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  backend_uploads:
  shared_movies:
